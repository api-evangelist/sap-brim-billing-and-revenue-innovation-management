meters:
  - name: contracted_consumption
    description: Consumption against the customer's negotiated SAP / Concur contract; reconcile to actual
      provider-published meters once available.
    unit: varies
    aggregation: sum
    dimensions:
      - service
      - region
principles:
  - name: Visibility
    description: Use SAP for Me, the BTP Cockpit, or the SAP Concur admin console (as applicable) to
      view consumption against entitlements; line items appear on the SAP / Concur invoice.
  - name: Allocation
    description: Allocate by SAP global account / subaccount or by Concur entity; map to internal cost
      centers via the relevant cockpit before chargeback.
  - name: Optimization
    description: Track CPEA/BTPEA balance burn or per-employee subscription utilization; right-size service
      plans and prune unused entitlements at renewal.
  - name: Accountability
    description: Designate a single billing owner and reconcile invoices monthly with usage reports from
      the relevant SAP / Concur cockpit.
