naftiko: "1.0.0-alpha1"

info:
  label: "SAP BRIM Subscription Billing API"
  description: "API for managing subscription lifecycle within the SAP BRIM suite. Supports creation, modification, renewal, suspension, and cancellation of subscriptions across various billing frequencies and models."
  tags:
    - Billing
    - Revenue Management
    - SAP
    - Subscription Management
  created: "2026-05-02"
  modified: "2026-05-02"

binds:
  - namespace: env
    keys:
      SAP_BRIM_OAUTH_TOKEN: SAP_BRIM_OAUTH_TOKEN

capability:
  consumes:
    - type: http
      namespace: sap-brim-subscription-billing
      baseUri: https://api.sap.com/subscription-billing/v1
      description: "SAP BRIM Subscription Billing API for subscription lifecycle management."
      authentication:
        type: bearer
        token: "{{SAP_BRIM_OAUTH_TOKEN}}"
      resources:
        - name: subscriptions
          path: /subscriptions
          description: "Subscription lifecycle management."
          operations:
            - name: list-subscriptions
              method: GET
              description: "List subscriptions with optional filtering."
              inputParameters:
                - name: customerId
                  in: query
                  type: string
                  required: false
                  description: "Filter by customer identifier"
                - name: status
                  in: query
                  type: string
                  required: false
                  description: "Filter by subscription status"
                - name: planId
                  in: query
                  type: string
                  required: false
                  description: "Filter by subscription plan"
                - name: offset
                  in: query
                  type: integer
                  required: false
                  description: "Pagination offset"
                - name: limit
                  in: query
                  type: integer
                  required: false
                  description: "Maximum results to return"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: create-subscription
              method: POST
              description: "Create a new subscription for a customer."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  customerId: "{{tools.customerId}}"
                  planId: "{{tools.planId}}"
                  startDate: "{{tools.startDate}}"
            - name: get-subscription
              method: GET
              description: "Get details of a specific subscription."
              inputParameters:
                - name: subscriptionId
                  in: path
                  type: string
                  required: true
                  description: "The subscription identifier"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: suspend-subscription
              method: POST
              description: "Suspend an active subscription."
              inputParameters:
                - name: subscriptionId
                  in: path
                  type: string
                  required: true
                  description: "The subscription identifier"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: cancel-subscription
              method: POST
              description: "Cancel a subscription."
              inputParameters:
                - name: subscriptionId
                  in: path
                  type: string
                  required: true
                  description: "The subscription identifier"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: plans
          path: /plans
          description: "Subscription plan catalog management."
          operations:
            - name: list-plans
              method: GET
              description: "List available subscription plans."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: get-plan
              method: GET
              description: "Get details of a specific subscription plan."
              inputParameters:
                - name: planId
                  in: path
                  type: string
                  required: true
                  description: "The plan identifier"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: customers
          path: /customers
          description: "Customer account management for subscriptions."
          operations:
            - name: list-customers
              method: GET
              description: "List customers with subscriptions."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: get-customer
              method: GET
              description: "Get customer account details."
              inputParameters:
                - name: customerId
                  in: path
                  type: string
                  required: true
                  description: "The customer identifier"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

  exposes:
    - type: rest
      port: 8101
      namespace: sap-brim-subscription-billing-api
      resources:
        - path: /v1/subscriptions
          name: subscriptions
          description: "Subscription management."
          operations:
            - method: GET
              name: list-subscriptions
              description: "List subscriptions."
              call: "sap-brim-subscription-billing.list-subscriptions"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/subscriptions/{subscriptionId}
          name: subscription
          description: "Single subscription."
          operations:
            - method: GET
              name: get-subscription
              description: "Get subscription by ID."
              call: "sap-brim-subscription-billing.get-subscription"
              with:
                subscriptionId: "rest.subscriptionId"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/plans
          name: plans
          description: "Subscription plans."
          operations:
            - method: GET
              name: list-plans
              description: "List subscription plans."
              call: "sap-brim-subscription-billing.list-plans"
              outputParameters:
                - type: object
                  mapping: "$."

    - type: mcp
      port: 9101
      namespace: sap-brim-subscription-billing-mcp
      transport: http
      tools:
        - name: list-subscriptions
          description: "List customer subscriptions with optional status and plan filtering."
          hints:
            readOnly: true
            openWorld: true
          call: "sap-brim-subscription-billing.list-subscriptions"
          outputParameters:
            - type: object
              mapping: "$."
        - name: get-subscription
          description: "Get details of a specific customer subscription."
          hints:
            readOnly: true
            openWorld: false
          call: "sap-brim-subscription-billing.get-subscription"
          with:
            subscriptionId: "tools.subscriptionId"
          outputParameters:
            - type: object
              mapping: "$."
        - name: create-subscription
          description: "Create a new subscription for a customer."
          hints:
            readOnly: false
            idempotent: false
          call: "sap-brim-subscription-billing.create-subscription"
          with:
            customerId: "tools.customerId"
            planId: "tools.planId"
          outputParameters:
            - type: object
              mapping: "$."
        - name: suspend-subscription
          description: "Suspend an active customer subscription."
          hints:
            readOnly: false
            destructive: false
            idempotent: true
          call: "sap-brim-subscription-billing.suspend-subscription"
          with:
            subscriptionId: "tools.subscriptionId"
          outputParameters:
            - type: object
              mapping: "$."
        - name: cancel-subscription
          description: "Cancel a customer subscription."
          hints:
            readOnly: false
            destructive: true
            idempotent: true
          call: "sap-brim-subscription-billing.cancel-subscription"
          with:
            subscriptionId: "tools.subscriptionId"
          outputParameters:
            - type: object
              mapping: "$."
        - name: list-plans
          description: "List available subscription plans in the catalog."
          hints:
            readOnly: true
            openWorld: true
          call: "sap-brim-subscription-billing.list-plans"
          outputParameters:
            - type: object
              mapping: "$."
        - name: list-customers
          description: "List customers with active or historical subscriptions."
          hints:
            readOnly: true
            openWorld: true
          call: "sap-brim-subscription-billing.list-customers"
          outputParameters:
            - type: object
              mapping: "$."
