        email: support@sap.com
        url: https://support.sap.com
  - name: SAP BRIM Usage Data Intake API
    description: >-
      API for ingesting high-volume usage data from various sources. Supports batch
      and real-time processing of usage events for rating and billing.
    image: https://www.sap.com/dam/application/shared/logos/sap-logo-svg.svg
