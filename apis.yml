    contact:
      - FN: SAP Support
        email: support@sap.com
        url: https://support.sap.com
  - name: SAP Subscription Order Management API
    description: >-
      API for managing subscription-based orders within the SAP BRIM suite,
      supporting complex offerings that combine physical products, services,
      and usage-based fees with full lifecycle management.
    image: https://www.sap.com/dam/application/shared/logos/sap-logo-svg.svg
    humanURL: https://help.sap.com/docs/BRIM
