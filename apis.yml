name: SAP BRIM (Billing and Revenue Innovation Management)
description: >-
  SAP BRIM (Billing and Revenue Innovation Management) is a comprehensive solution
  for order-to-cash processes, subscription management, usage-based pricing, and revenue
  management. It enables businesses to manage complex billing scenarios, subscription
  lifecycle, and revenue recognition.
image: https://www.sap.com/dam/application/shared/logos/sap-logo-svg.svg
url: https://www.sap.com/products/financial-management/billing-revenue-innovation-mgmt.html
created: '2024-01-15'
modified: '2025-03-04'
specificationVersion: '0.18'
tags:
  - Billing
  - Enterprise
  - Order to Cash
  - Revenue Management
  - SAP
  - Subscription Management
  - Usage-Based Pricing
apis:
  - name: SAP Convergent Charging API
    description: >-
      API for real-time charging and rating of usage-based services. Supports complex
      pricing models, prepaid and postpaid scenarios.
    image: https://www.sap.com/dam/application/shared/logos/sap-logo-svg.svg
    humanURL: https://help.sap.com/docs/SAP_CONVERGENT_CHARGING
    baseURL: https://api.sap.com/convergent-charging
    tags:
      - Charging
      - Rating
      - Real-Time
      - Usage-Based Pricing
    properties:
      - type: Documentation
        url: https://help.sap.com/docs/SAP_CONVERGENT_CHARGING
      - type: OpenAPI
        url: https://api.sap.com/api/convergent_charging/overview
      - type: OpenAPI
        url: openapi/sap-brim-convergent-charging-openapi.yml
      - type: Authentication
        url: https://help.sap.com/docs/SAP_CONVERGENT_CHARGING/authentication
    contact:
      - FN: SAP Support
        email: support@sap.com
        url: https://support.sap.com
  - name: SAP Convergent Invoicing API
    description: >-
      API for creating, managing, and processing invoices from multiple sources. Supports
      complex billing scenarios, invoice consolidation, and flexible output formats.
    image: https://www.sap.com/dam/application/shared/logos/sap-logo-svg.svg
    humanURL: https://help.sap.com/docs/SAP_CONVERGENT_INVOICING
    baseURL: https://api.sap.com/convergent-invoicing
    tags:
      - Billing
      - Invoice Management
      - Invoicing
    properties:
      - type: Documentation
        url: https://help.sap.com/docs/SAP_CONVERGENT_INVOICING
      - type: OpenAPI
        url: https://api.sap.com/api/convergent_invoicing/overview
      - type: Sandbox
        url: https://api.sap.com/api/convergent_invoicing/tryout
    contact:
      - FN: SAP Support
        email: support@sap.com
        url: https://support.sap.com
  - name: SAP Subscription Billing API
    description: >-
      API for managing subscription lifecycle, including creation, modification, renewal,
      and cancellation. Supports various billing frequencies and subscription models.
    image: https://www.sap.com/dam/application/shared/logos/sap-logo-svg.svg
    humanURL: https://help.sap.com/docs/SAP_SUBSCRIPTION_BILLING
    baseURL: https://api.sap.com/subscription-billing
    tags:
      - Lifecycle Management
      - Recurring Billing
      - Subscriptions
    properties:
      - type: Documentation
        url: https://help.sap.com/docs/SAP_SUBSCRIPTION_BILLING
      - type: OpenAPI
        url: https://api.sap.com/api/subscription_billing/overview
