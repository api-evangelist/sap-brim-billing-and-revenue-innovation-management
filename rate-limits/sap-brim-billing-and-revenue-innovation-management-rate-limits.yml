specification: API Commons Rate Limits
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/RateLimits
provider: SAP BRIM (Billing and Revenue Innovation Management)
providerId: sap-brim-billing-and-revenue-innovation-management
created: '2026-05-04'
modified: '2026-05-04'
tags:
  - Billing
  - Enterprise
  - Order to Cash
  - Revenue Management
  - SAP
  - Subscription Management
  - Usage-Based Pricing
  - Rate Limiting
  - Quotas
  - Throttling
description: Machine-readable rate limit definitions for the SAP BRIM (Billing and Revenue Innovation
  Management) API surface. Captures per-tier quotas, burst behavior, response signaling, and recovery
  semantics. Defaults are scaffold values to be replaced with published provider limits.
headers:
  limit: X-RateLimit-Limit
  remaining: X-RateLimit-Remaining
  reset: X-RateLimit-Reset
  retryAfter: Retry-After
  policy: RateLimit-Policy
responseCodes:
  throttled: 429
  quotaExceeded: 429
  serviceUnavailable: 503
limits:
  - tier: free
    name: Free Tier Default
    scope: api-key
    metric: requests_per_minute
    limit: 10
    burst: 20
    timeFrame: minute
    applies:
      - SAP Convergent Charging API
      - SAP Convergent Invoicing API
      - SAP Subscription Billing API
      - SAP Contract Accounts Receivable and Payable API
      - SAP BRIM Usage Data Intake API
      - SAP Revenue Accounting and Reporting API
      - SAP Subscription Order Management API
  - tier: free
    name: Free Tier Monthly Quota
    scope: api-key
    metric: requests_per_month
    limit: 1000
    timeFrame: month
    applies:
      - SAP Convergent Charging API
      - SAP Convergent Invoicing API
      - SAP Subscription Billing API
      - SAP Contract Accounts Receivable and Payable API
      - SAP BRIM Usage Data Intake API
      - SAP Revenue Accounting and Reporting API
      - SAP Subscription Order Management API
  - tier: professional
    name: Professional Tier Default
    scope: api-key
    metric: requests_per_minute
    limit: 100
    burst: 200
    timeFrame: minute
    applies:
      - SAP Convergent Charging API
      - SAP Convergent Invoicing API
      - SAP Subscription Billing API
      - SAP Contract Accounts Receivable and Payable API
      - SAP BRIM Usage Data Intake API
      - SAP Revenue Accounting and Reporting API
      - SAP Subscription Order Management API
  - tier: professional
    name: Professional Tier Monthly Quota
    scope: api-key
    metric: requests_per_month
    limit: 100000
    timeFrame: month
    applies:
      - SAP Convergent Charging API
      - SAP Convergent Invoicing API
      - SAP Subscription Billing API
      - SAP Contract Accounts Receivable and Payable API
      - SAP BRIM Usage Data Intake API
      - SAP Revenue Accounting and Reporting API
      - SAP Subscription Order Management API
  - tier: enterprise
    name: Enterprise Negotiated Limit
    scope: contract
    metric: requests_per_minute
    limit: 1000
    burst: 5000
    timeFrame: minute
    applies:
      - SAP Convergent Charging API
      - SAP Convergent Invoicing API
      - SAP Subscription Billing API
      - SAP Contract Accounts Receivable and Payable API
      - SAP BRIM Usage Data Intake API
      - SAP Revenue Accounting and Reporting API
      - SAP Subscription Order Management API
policies:
  - name: Backoff Strategy
    description: Clients should implement exponential backoff with jitter, honoring the Retry-After header
      when present.
  - name: Burst Handling
    description: Short bursts above the steady-state limit are tolerated up to the documented burst ceiling
      before throttling engages.
  - name: Quota Reset
    description: Monthly quotas reset at the start of each calendar month in UTC. Per-minute and per-second
      windows reset on a sliding-window basis.
  - name: Fair Use
    description: Even on uncapped enterprise tiers, sustained usage that materially impacts shared infrastructure
      may be subject to fair-use throttling.
maintainers:
  - FN: Kin Lane
    email: kin@apievangelist.com
    url: https://apievangelist.com
